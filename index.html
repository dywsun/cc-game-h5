<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dywsun's cocos minigame</title>
    <style>
        :root {
            /* iPhone 16 Plus 尺寸 */
            --iphone-width: 440px;
            --iphone-height: 947px;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Comic Sans MS", "Chalkboard SE", "Microsoft YaHei", sans-serif; /* 尝试使用更圆润的字体 */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            
            /* --- 卡通风格背景渐变 --- */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        /* --- 动画背景层 (云朵和气泡) --- */
        .cartoon-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        /* 漂浮的气泡 */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            animation: floatUp 10s infinite linear;
            bottom: -50px;
        }

        .bubble:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 8s; animation-delay: 0s; }
        .bubble:nth-child(2) { left: 20%; width: 80px; height: 80px; animation-duration: 12s; animation-delay: 2s; background: rgba(255,255,255,0.2); }
        .bubble:nth-child(3) { left: 70%; width: 50px; height: 50px; animation-duration: 10s; animation-delay: 1s; }
        .bubble:nth-child(4) { left: 85%; width: 30px; height: 30px; animation-duration: 15s; animation-delay: 4s; }
        .bubble:nth-child(5) { left: 50%; width: 60px; height: 60px; animation-duration: 9s; animation-delay: 3s; border-radius: 10px; /* 方形气泡 */ }

        /* 纯CSS绘制的云朵 */
        .cloud {
            position: absolute;
            background: #fff;
            border-radius: 50px;
            opacity: 0.9;
            animation: drift 20s infinite linear;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        
        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: #fff;
            border-radius: 50%;
        }

        /* 云朵形状 1 */
        .cloud-1 {
            width: 120px; height: 40px; top: 10%; left: -150px; animation-duration: 25s;
        }
        .cloud-1::after { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::before { width: 40px; height: 40px; top: -15px; left: 45px; }

        /* 云朵形状 2 */
        .cloud-2 {
            width: 160px; height: 50px; top: 25%; left: -200px; animation-duration: 35s; animation-delay: 5s;
        }
        .cloud-2::after { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud-2::before { width: 50px; height: 50px; top: -20px; left: 80px; }

        /* 云朵形状 3 */
        .cloud-3 {
            width: 100px; height: 35px; top: 15%; left: -120px; animation-duration: 28s; animation-delay: 15s; opacity: 0.7;
        }
        .cloud-3::after { width: 40px; height: 40px; top: -20px; left: 10px; }

        /* --- 动画关键帧 --- */
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes drift {
            0% { left: -200px; }
            100% { left: 110%; }
        }

        /* --- 水印层 --- */
        .watermark-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 在卡通背景之上 */
            pointer-events: none;
            background-repeat: repeat;
        }

        /* --- Iframe 样式 --- */
        iframe {
            width: var(--iphone-width);
            height: var(--iphone-height);
            border: 3px solid var(--border-color); /* 保持原有3px边框 */
            background-color: #fff;
            z-index: 2; /* 最顶层 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border-radius: 30px; /* 增大圆角，更像手机 */
            overflow: hidden;
            position: relative;
        }

        /* 响应式适配 */
        @media (max-width: 480px), (max-height: 1000px) {
            iframe { transform: scale(0.85); }
        }
        @media (max-width: 380px), (max-height: 820px) {
            iframe { transform: scale(0.7); }
        }
    </style>
</head>
<body>

    <!-- 卡通动画背景容器 -->
    <div class="cartoon-bg">
        <!-- 漂浮的云朵 -->
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        
        <!-- 漂浮的几何气泡 -->
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- 水印层 -->
    <div class="watermark-layer" id="watermarkLayer"></div>

    <!-- Iframe -->
    <iframe src="sudu/web-mobile/index.html" frameborder="0" scrolling="no"></iframe>

    <script>
        // ---------------------------------------------------------
        // 在这里修改水印文字
        // ---------------------------------------------------------
        const watermarkText = "wintersun's cocos minigame";
        // ---------------------------------------------------------

        function updateWatermark(text) {
            const layer = document.getElementById('watermarkLayer');
            
            if (!text || text.trim() === '') {
                layer.style.backgroundImage = 'none';
                return;
            }

            const svgWidth = 300;
            const svgHeight = 200;
            const fontSize = 16;
            const angle = -30; 
            const textColor = '%23000000'; 
            const textOpacity = 0.1; // 稍微调高一点透明度，以便在亮色背景上更清晰

            const svgContent = `
                <svg width='${svgWidth}' height='${svgHeight}' xmlns='http://www.w3.org/2000/svg'>
                    <text x='50%' y='50%' 
                          font-family='sans-serif' 
                          font-weight="bold"
                          font-size='${fontSize}' 
                          fill='${textColor}' 
                          fill-opacity='${textOpacity}' 
                          transform='rotate(${angle}, ${svgWidth/2}, ${svgHeight/2})' 
                          text-anchor='middle' 
                          dominant-baseline='middle'
                          style="pointer-events: none;">
                        ${text}
                    </text>
                </svg>
            `;

            const encodedSvg = encodeURIComponent(svgContent)
                .replace(/'/g, '%27')
                .replace(/"/g, '%22');
            
            const dataUri = `data:image/svg+xml;charset=utf-8,${encodedSvg}`;
            layer.style.backgroundImage = `url('${dataUri}')`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateWatermark(watermarkText);
        });
    </script>
</body>
</html>
